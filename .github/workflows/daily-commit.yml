name: Daily Commit

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update timestamp
        run: |
          echo "Last active: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > logs/activity.log

      - name: Commit and push
        run: |
          git config user.name "calfredo-bot"
          git config user.email "catimbangcedrickalfredo@gmail.com"
          git add logs/activity.log
          git diff --staged --quiet || git commit -m "chore: daily activity log [skip ci]"
          git push https://x:${{ secrets.PAT }}@github.com/${{ github.repository }}.git HEAD:main
