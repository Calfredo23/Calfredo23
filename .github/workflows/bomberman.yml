name: Generate Bomberman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'bomberman'

      - name: Recolor to Calfredo palette
        run: |
          # Dark SVGs (dark background, gold/red cells, light text)
          find ./dist -name "*-dark.svg" -exec sed -i \
            -e 's/#0d1117/#2c011a/g' \
            -e 's/#161b22/#3a0524/g' \
            -e 's/#0e4429/#45102a/g' \
            -e 's/#006d32/#5c1738/g' \
            -e 's/#26a641/#8a2655/g' \
            -e 's/#39d353/#d9a543/g' \
            -e 's/#8b949e/#ffd884/g' {} +

          # Light SVGs (warm cream bg, warm burgundy gradient)
          find ./dist -name "*.svg" ! -name "*-dark.svg" -exec sed -i \
            -e 's/#ffffff/#fffeef/g' \
            -e 's/#ebedf0/#f0e4da/g' \
            -e 's/#9be9a8/#d3cdbf/g' \
            -e 's/#40c463/#a09f91/g' \
            -e 's/#30a14e/#562a3e/g' \
            -e 's/#216e39/#45102a/g' \
            -e 's/#57606a/#321024/g' \
            -e 's/#000000/#2c011a/g' {} +

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.PAT }}
          publish_dir: ./dist
          publish_branch: output-games
          force_orphan: true
